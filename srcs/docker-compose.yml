services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    networks:
      - inception
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    env_file:
      - .env
    secrets:
      - db_password
      - credentials
      - visitor
    networks:
      - inception
    volumes:
      - wp_data:/var/www/html
    depends_on:
      - mariadb
    restart: always

  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    env_file:
      - .env
    ports:
      - "443:443"
    networks:
      - inception
    volumes:
      - wp_data:/var/www/html
    depends_on:
      - wordpress
    restart: always

  adminer:
    build: ./requirements/bonus/adminer
    image: adminer
    container_name: adminer
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - inception
    depends_on:
      - mariadb
    restart: always

  redis:
    build: ./requirements/bonus/redis
    image: redis
    container_name: redis
    env_file:
      - .env
    networks:
      - inception
    depends_on:
      - wordpress
    restart: always

  static:
    build: ./requirements/bonus/static
    image: static
    container_name: static
    env_file:
      - .env
    networks:
      - inception
    ports:
      - "8081:8081"
    restart: always

  ftp:
    build: ./requirements/bonus/ftp
    image: ftp
    container_name: ftp
    env_file:
      - .env
    secrets:
      - ftp_password
    networks:
      - inception
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    depends_on:
      - mariadb
      - wordpress
    volumes:
      - wp_data:/var/www/html
    restart: always

  glances:
    build: ./requirements/bonus/glances
    image: glances
    container_name: glances
    env_file:
      - .env
    ports:
      - "61208:61208"
    networks:
      - inception
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    pid: "host"
    restart: always

networks:
  inception:

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/fducrot/data/mariadb
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/fducrot/data/wordpress

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password: 
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt
  visitor:
    file: ../secrets/visitor.txt
  ftp_password:
    file: ../secrets/ftp_password.txt